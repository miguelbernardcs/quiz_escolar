<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag essencial para o mobile não dar zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Quiz Escolar - 7º Ano</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', Gadget, sans-serif; touch-action: manipulation; }
        
        /* Agora o corpo e o container ocupam 100% da tela */
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        
        #game-container { 
            width: 100vw; 
            height: 100vh; 
            background-color: #e3edf2; 
            display: flex; 
            flex-direction: column;
            position: relative;
        }
        
        .top-bar { width: 100%; height: 10vh; background-color: #b8bacf; border-bottom: 4px solid #000; display: flex; align-items: center; padding: 0 5vw; justify-content: space-between; }
        
        #screen-menu { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-gap: 2vw; 
            padding: 2vh 2vw; 
            height: 90vh; 
        }
        
        .subject-card { 
            border: 4px solid #111; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 3vw; 
            color: #fff; 
            text-shadow: 2px 2px #000; 
            cursor: pointer; 
            box-shadow: 0 6px #000; 
        }

        .mat { background-color: #1faae2; } .his { background-color: #dc3226; } .geo { background-color: #e59b24; }
        .por { background-color: #1cb81c; } .cie { background-color: #6830f3; } .edf { background-color: #f1c40f; }

        #screen-quiz { display: none; flex-direction: column; align-items: center; justify-content: space-around; height: 90vh; padding: 5vh; }
        .question-text { font-size: 4vh; text-align: center; color: #000; }
        .score-highlight { font-size: 8vh; color: #1cb81c; display: block; }
        
        .button-zone { display: flex; gap: 5vw; }
        .btn-game { width: 25vw; height: 10vh; border: 4px solid #000; border-radius: 15px; background-color: #a7a9be; font-size: 2vh; font-weight: bold; cursor: pointer; box-shadow: 0 4px #000; }
        .btn-exit { background-color: #dc3226; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar">
            <div id="btn-voltar-menu" style="cursor:pointer; font-size: 4vh;">☰</div>
            <div id="btn-fullscreen" style="cursor:pointer; font-size: 4vh;">⛶</div>
        </div>

        <div id="screen-menu">
            <div class="subject-card mat" data-materia="mat">Matemática</div>
            <div class="subject-card his" data-materia="his">História</div>
            <div class="subject-card geo" data-materia="geo">Geografia</div>
            <div class="subject-card por" data-materia="por">Português</div>
            <div class="subject-card cie" data-materia="cie">Ciências</div>
            <div class="subject-card edf" data-materia="edf">Ed. Fís.</div>
        </div>

        <div id="screen-quiz">
            <div class="question-text" id="question-field"></div>
            <div id="feedback" style="font-size: 5vh;"></div>
            <div class="button-zone" id="button-zone">
                <button class="btn-game btn-exit" id="btn-sair">SAIR</button>
                <button class="btn-game" id="btn-falso">FALSO</button>
                <button class="btn-game" id="btn-verdadeiro">VERDADEIRO</button>
            </div>
        </div>
    </div>

    <script>
        const database = { /* O seu banco de dados continua igual */ };
        let currentQuestions = [], currentIndex = 0, acertos = 0, answered = false;

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        // ... O restante da lógica (startQuiz, checkAnswer, etc) continua igual ...
    </script>
</body>
</html>
